name: Update CN Radar rules

on:
  workflow_dispatch:
  schedule:
    # Checks weekly at 05:38 Asia/Shanghai; the first step gates it to every 14 days.
    - cron: "38 21 * * 3"

permissions:
  contents: write

jobs:
  cn-radar:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Check 14-day cadence
        id: cadence
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          anchor="$(date -u -d '2026-06-24 21:38:00 UTC' +%s)"
          now="$(date -u +%s)"
          weeks="$(( (now - anchor) / 604800 ))"
          if [ "$(( weeks % 2 ))" -eq 0 ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping this weekly check; next CN Radar update is on the 14-day cadence."
          fi

      - name: Checkout
        if: steps.cadence.outputs.should_run == 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.cadence.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: steps.cadence.outputs.should_run == 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install maxminddb dnspython

      - name: Build CN Radar rules
        if: steps.cadence.outputs.should_run == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          PYTHONUNBUFFERED: "1"
        run: |
          python scripts/build_cn_radar.py --top 500000 --workers 128 --timeout 3

      - name: Commit CN Radar rules
        if: steps.cadence.outputs.should_run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add rules/common/CN_Radar.arrs rules/common/index.json rules/common/catalog.md
          if git diff --cached --quiet; then
            echo "No CN Radar updates."
          else
            git commit -m "Update CN Radar $(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')"
            git push
          fi
